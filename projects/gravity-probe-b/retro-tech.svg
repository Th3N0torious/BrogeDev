<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Filters and effects -->
  <defs>
    <!-- Star filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="blur"/>
      <feComposite in="blur" operator="over" in2="SourceGraphic"/>
    </filter>
    <!-- Starburst pattern -->
    <pattern id="starPattern" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M5,2 L6,5 L5,8 L4,5 Z" fill="#FFD93D" opacity="0.6"/>
    </pattern>
  </defs>
  
  <!-- Atomic rings -->
  <ellipse cx="200" cy="200" rx="150" ry="40" stroke="#FF6B6B" fill="none" stroke-width="2" transform="rotate(0 200 200)" opacity="0.8">
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="20s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="200" cy="200" rx="150" ry="40" stroke="#4ECDC4" fill="none" stroke-width="2" transform="rotate(60 200 200)" opacity="0.8">
    <animateTransform attributeName="transform" type="rotate" from="60 200 200" to="420 200 200" dur="15s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="200" cy="200" rx="150" ry="40" stroke="#FFD93D" fill="none" stroke-width="2" transform="rotate(120 200 200)" opacity="0.8">
    <animateTransform attributeName="transform" type="rotate" from="120 200 200" to="480 200 200" dur="25s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Star clusters in corners -->
  <g id="corner-stars" filter="url(#glow)">
    <!-- Top Left Star Cluster -->
    <g transform="translate(80,80)">
      <path d="M0,0 L5,-15 L0,-30 L-5,-15 Z" fill="#4ECDC4" opacity="0.8">
        <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
      </path>
      <path d="M-15,5 L0,0 L15,5 L0,10 Z" fill="#4ECDC4" opacity="0.8">
        <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2s" repeatCount="indefinite"/>
      </path>
      <circle r="2" fill="white" opacity="0.9">
        <animate attributeName="r" values="2;3;2" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Top Right Star Cluster -->
    <g transform="translate(320,80)">
      <path d="M0,0 L5,-15 L0,-30 L-5,-15 Z" fill="#FFD93D" opacity="0.8">
        <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
      </path>
      <path d="M-15,5 L0,0 L15,5 L0,10 Z" fill="#FFD93D" opacity="0.8">
        <animate attributeName="opacity" values="0.8;0.4;0.8" dur="3s" repeatCount="indefinite"/>
      </path>
      <circle r="2" fill="white" opacity="0.9">
        <animate attributeName="r" values="2;3;2" dur="2.5s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Bottom Left Star Cluster -->
    <g transform="translate(80,320)">
      <path d="M0,0 L5,15 L0,30 L-5,15 Z" fill="#FF6B6B" opacity="0.8">
        <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3.5s" repeatCount="indefinite"/>
      </path>
      <path d="M-15,-5 L0,0 L15,-5 L0,-10 Z" fill="#FF6B6B" opacity="0.8">
        <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2.5s" repeatCount="indefinite"/>
      </path>
      <circle r="2" fill="white" opacity="0.9">
        <animate attributeName="r" values="2;3;2" dur="3s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Bottom Right Star Cluster -->
    <g transform="translate(320,320)">
      <path d="M0,0 L5,15 L0,30 L-5,15 Z" fill="#4ECDC4" opacity="0.8">
        <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
      </path>
      <path d="M-15,-5 L0,0 L15,-5 L0,-10 Z" fill="#4ECDC4" opacity="0.8">
        <animate attributeName="opacity" values="0.8;0.4;0.8" dur="3s" repeatCount="indefinite"/>
      </path>
      <circle r="2" fill="white" opacity="0.9">
        <animate attributeName="r" values="2;3;2" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- Connecting lines with glow -->
  <g id="connections" stroke="#FFD93D" stroke-width="1" opacity="0.4">
    <line x1="80" y1="80" x2="200" y2="200"/>
    <line x1="320" y1="320" x2="200" y2="200"/>
    <line x1="80" y1="320" x2="200" y2="200"/>
    <line x1="320" y1="80" x2="200" y2="200"/>
  </g>

  <!-- Central starburst -->
  <g id="starburst">
    <path d="M200,170 L210,200 L200,230 L190,200 Z" fill="#FF6B6B" opacity="0.9"/>
    <path d="M170,200 L200,190 L230,200 L200,210 Z" fill="#4ECDC4" opacity="0.9"/>
  </g>
  <g transform="translate(200 200)">
    <circle r="30" fill="#FFD93D" opacity="0.9"/>
    <circle r="20" fill="transparent"/>
    <circle r="10" fill="#FFD93D"/>
  </g>

  <!-- Title with enhanced glow -->
  <text x="200" y="205" 
        text-anchor="middle" 
        font-family="Arial, sans-serif" 
        font-weight="bold" 
        font-size="20"
        stroke="white"
        stroke-width="4"
        stroke-linejoin="round"
        paint-order="stroke fill"
        filter="url(#glow)">
    Gravity Probe B
  </text>
  <text x="200" y="205" 
        text-anchor="middle" 
        fill="#E43F5A" 
        font-family="Arial, sans-serif" 
        font-weight="bold" 
        font-size="20"
        filter="url(#glow)">
    Gravity Probe B
  </text>
</svg>
